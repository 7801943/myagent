# MyAgent 配置文件示例
# 复制为 config.yaml 并填入实际值

agent:
  # System Prompt
  system_prompt: "你是一个智能助手，可以帮助用户完成各种任务。"

  # 最大 ReAct 迭代次数
  max_iterations: 50

  # Provider 配置（支持多路冗余）
  providers:
    - name: "openai-primary"
      type: "openai"
      model: "gpt-4o"
      api_key: "${OPENAI_API_KEY}"   # 支持环境变量引用
      api_base: "https://api.openai.com/v1"  # 可选，自定义 API 基地址
      priority: 1

    - name: "openai-backup"
      type: "openai"
      model: "gpt-4o-mini"
      api_key: "${OPENAI_API_KEY}"
      priority: 2

    # - name: "anthropic"
    #   type: "anthropic"
    #   model: "claude-sonnet-4-20250514"
    #   api_key: "${ANTHROPIC_API_KEY}"

  # 上下文管理
  context:
    max_tokens_budget: 100000
    tool_result_max_chars: 4000
    recent_turns: 20

  # 工具执行
  tools:
    default_timeout: 30.0

  # 可观测性
  observability:
    audit_backend: "jsonl"    # jsonl | sqlite
    audit_path: "./logs/audit.jsonl"
    # audit_path: "./logs/audit.db"
    log_level: "INFO"

  # 状态持久化
  state:
    backend: "jsonl"          # jsonl | sqlite
    path: "./state/sessions.jsonl"