<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgent — 智能助理集成开发环境</title>

    <!-- Google Fonts: Outfit & Outfit Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Outfit+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- KaTeX math formulas CSS support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

    <!-- CSS Modules Design System -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/workspace.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/tool-chip.css">
    <link rel="stylesheet" href="css/input.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/katex.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <!-- ═══════════════════════════════════════════════════════
         Login Overlay — 登录覆盖层（优先级最高，阻止未认证访问）
         ═══════════════════════════════════════════════════════ -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <div class="login-brand">
                <h1>myagent</h1>
                <p>请登录以继续</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="login-field">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="login-field">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password"
                        required>
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" id="loginSubmitBtn" class="login-btn">登录</button>
            </form>
        </div>
    </div>

    <div class="app-layout">
        <!-- ============================================================
           Unified Top Global Header (Spans full screen width!)
           ============================================================ -->
        <header class="global-header">
            <!-- Left: Brand + Model Name -->
            <div class="header-left">
                <div class="header-brand">
                    <h1 class="header-title">myagent</h1>
                    <span class="header-model-name" id="headerModelName"></span>
                </div>
            </div>
            <!-- Right: Action Buttons -->
            <div class="header-right">
                <!-- User Info + Connection Badge (登录后显示) -->
                <div id="userInfoBadge" class="user-info-badge" style="display: none;" title="当前用户与连接状态">
                    <div class="header-conn-status" id="headerConnStatus" title="连接状态">
                        <span class="header-conn-dot" id="headerConnDot"></span>
                        <span class="header-conn-text" id="headerConnText">未连接</span>
                    </div>
                    <div class="user-avatar"><span id="userInfoAvatar">A</span></div>
                    <span id="userInfoName">admin</span>
                    <button id="logoutBtn"
                        style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;"
                        title="登出">
                        <svg class="logout-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <button id="newChatHeaderBtn" class="icon-btn" title="新建会话">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </button>
                <button id="clearBtn" class="icon-btn" title="清空对话">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                </button>
                <button id="themeToggle" class="icon-btn" title="切换主题">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <path
                            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <button id="fullscreenToggle" class="fullscreen-btn" title="全屏">
                    <svg class="icon-fullscreen-enter" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3" />
                        <path d="M16 3h3a2 2 0 0 1 2 2v3" />
                        <path d="M8 21H5a2 2 0 0 1-2-2v-3" />
                        <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
                    </svg>
                    <svg class="icon-fullscreen-exit" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M8 3v3a2 2 0 0 1-2 2H3" />
                        <path d="M16 3v3a2 2 0 0 0 2 2h3" />
                        <path d="M8 21v-3a2 2 0 0 0-2-2H3" />
                        <path d="M16 21v-3a2 2 0 0 1 2-2h3" />
                    </svg>
                </button>
                <!-- Layout Mode Toggle -->
                <div class="layout-toggle-group" id="layoutToggleGroup">
                    <button class="layout-btn" data-layout="doc-only" title="文档预览占满">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                        </svg>
                    </button>
                    <button class="layout-btn active" data-layout="split" title="文档:Agent = 6:4">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <line x1="14" y1="3" x2="14" y2="21" />
                        </svg>
                    </button>
                    <button class="layout-btn" data-layout="chat-only" title="Agent对话占满">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <path d="M8 8h8M8 12h5" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Global Token Usage Bar (横贯全宽，紧贴标题栏下方) -->
        <div class="global-token-bar" id="globalTokenBar">
            <div class="global-token-bar-fill" id="globalTokenBarFill"></div>
        </div>

        <!-- Main horizontal layout container -->
        <div class="main-layout-container">
            <!-- ============================================================
               1. Left-most Activity Bar
               ============================================================ -->
            <aside class="activity-bar">
                <div class="activity-bar-top">
                    <!-- Sidebar Toggle Button -->
                    <button id="sidebarToggle" class="ab-item" title="折叠/展开会话栏 (⌘E)">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <line x1="9" y1="3" x2="9" y2="21" />
                        </svg>
                    </button>
                    <!-- Workspace Tab Buttons -->
                    <button class="ab-item ws-tab-btn active" data-tab="empty" title="主页">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                    </button>
                    <button class="ab-item ws-tab-btn" data-tab="files" title="目录树">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                        </svg>
                    </button>
                    <button class="ab-item ws-tab-btn" data-tab="preview" title="预览">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" />
                            <line x1="8" y1="21" x2="16" y2="21" />
                            <line x1="12" y1="17" x2="12" y2="21" />
                        </svg>
                    </button>
                    <button class="ab-item ws-tab-btn" data-tab="editor" title="编辑器">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z" />
                        </svg>
                    </button>
                </div>
                <div class="activity-bar-bottom">
                    <div class="ab-item placeholder" title="搜索 (Coming Soon)">
                        <div class="ab-placeholder-dot"></div>
                    </div>
                    <div class="ab-item placeholder" title="设置与主题 (Coming Soon)">
                        <div class="ab-placeholder-dot"></div>
                    </div>
                </div>
            </aside>

            <!-- ============================================================
               2. Collapsible Session Sidebar
               ============================================================ -->
            <aside id="sessionSidebar" class="sidebar">
                <!-- 新建会话按钮 -->
                <div class="sidebar-new-chat">
                    <button id="newChatBtn" class="new-chat-btn" title="新建会话">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        <span>新建会话</span>
                    </button>
                </div>

                <!-- 会话列表 -->
                <div class="sidebar-sessions">
                    <div class="sidebar-section-title">会话列表</div>
                    <div id="sessionList" class="session-list">
                        <!-- 动态填充 -->
                    </div>
                </div>
            </aside>

            <!-- ============================================================
               3. Left-Center Workspace Panel (文档预览区域)
               ============================================================ -->
            <aside id="workspacePanel" class="workspace-panel">
                <!-- Floating Canvas Card -->
                <div class="workspace-canvas">
                    <!-- Tab Bar — OnlyOffice document tabs -->
                    <div class="workspace-canvas-tabs">
                        <div class="canvas-tab active">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                <polyline points="14 2 14 8 20 8" />
                            </svg>
                            <span id="workspaceDocumentTitle">文档预览</span>
                            <button class="canvas-tab-close" title="关闭">&times;</button>
                        </div>
                        <button class="canvas-tab-add" title="新建文档标签">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                        </button>
                    </div>
                    <!-- Canvas Body — OnlyOffice iframe will be here -->
                    <div class="workspace-canvas-body">
                        <div class="workspace-content">
                            <!-- Tab: Default Landing -->
                            <div class="workspace-tab-content active" data-tab="empty">
                                <div class="workspace-landing">
                                    <div class="workspace-landing-icon">
                                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="1">
                                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                            <polyline points="14 2 14 8 20 8" />
                                            <line x1="16" y1="13" x2="8" y2="13" />
                                            <line x1="16" y1="17" x2="8" y2="17" />
                                            <polyline points="10 9 9 9 8 9" />
                                        </svg>
                                    </div>
                                    <div class="workspace-landing-text">文档预览</div>
                                    <div class="workspace-landing-hint">OnlyOffice 文档将在此处显示</div>
                                </div>
                            </div>

                            <!-- Tab: Files Tree -->
                            <div class="workspace-tab-content" data-tab="files">
                                <div class="workspace-empty">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.5">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                        <polyline points="14 2 14 8 20 8" />
                                    </svg>
                                    <p>暂无文件目录</p>
                                    <span>OnlyOffice 或 kkfileview 项目目录将在此加载</span>
                                </div>
                            </div>

                            <!-- Tab: Preview -->
                            <div class="workspace-tab-content" data-tab="preview">
                                <div class="workspace-empty">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.5">
                                        <rect x="2" y="3" width="20" height="14" rx="2" />
                                        <line x1="8" y1="21" x2="16" y2="21" />
                                        <line x1="12" y1="17" x2="12" y2="21" />
                                    </svg>
                                    <p>暂无预览内容</p>
                                    <span>生成的 HTML / Markdown 预览文件将显示在此</span>
                                </div>
                            </div>

                            <!-- Tab: Editor (OnlyOffice) -->
                            <div class="workspace-tab-content" data-tab="editor">
                                <div class="onlyoffice-shell">
                                    <div id="onlyofficeEditor" class="onlyoffice-editor"></div>
                                    <div id="onlyofficeStatus" class="onlyoffice-status"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>



            <!-- ============================================================
               4. Right Agent Chat Panel
               ============================================================ -->
            <div class="main-panel chat-panel empty-chat" id="chatPanel">
                <!-- Agent Dialog scrollable content area -->
                <main id="chatContainer" class="chat-container">
                    <!-- Message list bubbles -->
                    <div id="messageList" class="message-list"></div>
                </main>

                <!-- Dynamic Input Container -->
                <div class="dynamic-input-container" id="dynamicInputContainer">
                    <div class="centered-chat-title" id="centeredChatTitle">你好，我是 MyAgent</div>

                    <!-- Active Status Indicator: above input card -->
                    <div class="status-floating-container">
                        <span id="statusIndicator" class="status-badge status-disconnected">未连接</span>
                    </div>

                    <div class="input-card glass">
                        <!-- Input area -->
                        <textarea id="userInput" placeholder="输入您的问题..." rows="1" autofocus></textarea>

                        <!-- Bottom control row inside card -->
                        <div class="input-card-bottom">
                            <div class="input-card-left-toolbar">
                                <button class="icon-btn-upload" title="上传文件 (Reserved)">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="5" x2="12" y2="19" />
                                        <line x1="5" y1="12" x2="19" y2="12" />
                                    </svg>
                                </button>
                                <div class="input-dropdown model-display" title="当前后端模型">
                                    <select id="modelSelect" disabled>
                                        <option value="">等待模型状态</option>
                                    </select>
                                    <svg class="dropdown-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2.5">
                                        <polyline points="6 9 12 15 18 9" />
                                    </svg>
                                </div>
                            </div>
                            <div class="input-card-right-toolbar">
                                <button id="sendBtn" class="send-btn-circle" title="发送">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="5" y1="12" x2="19" y2="12" />
                                        <polyline points="12 5 19 12 12 19" />
                                    </svg>
                                </button>
                                <button id="stopBtn" class="send-btn-circle stop-btn-circle" title="停止"
                                    style="display:none;">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                        <rect x="4" y="4" width="16" height="16" rx="2" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="input-disclaimer">
                        AI 可能犯错，请检查结果.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- HITL Human-in-the-loop modal overlay -->
    <div id="hitlModal" class="modal-overlay" style="display: none;">
        <div class="modal-card glass">
            <div class="modal-header">
                <span class="modal-icon">⚠️</span>
                <h3>需要人工审批</h3>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>工具</label>
                    <code id="hitlToolName"></code>
                </div>
                <div class="modal-field">
                    <label>原因</label>
                    <p id="hitlReason"></p>
                </div>
                <div class="modal-field">
                    <label>参数</label>
                    <pre id="hitlArgs"></pre>
                </div>
            </div>
            <div class="modal-footer">
                <button id="hitlReject" class="btn btn-danger">拒绝</button>
                <button id="hitlApprove" class="btn btn-success">批准</button>
            </div>
        </div>
    </div>

    <!-- marked.js — Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <!-- KaTeX — Math rendering -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <!-- JS 入口 (ES Module) -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
