<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgent — 智能助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-layout">
        <!-- 左侧侧栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="2" />
                        <circle cx="10" cy="11" r="2" fill="currentColor" />
                        <circle cx="18" cy="11" r="2" fill="currentColor" />
                        <path d="M9 18c1.5 2 7 2 9 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                    <span class="sidebar-title">MyAgent</span>
                </div>
                <button id="sidebarToggle" class="sidebar-toggle-btn" title="折叠侧栏">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
            </div>

            <!-- 新建会话按钮 -->
            <div class="sidebar-new-chat">
                <button id="newChatBtn" class="new-chat-btn" title="新建会话">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span>新建会话</span>
                </button>
            </div>

            <!-- 会话列表 -->
            <div class="sidebar-sessions">
                <div class="sidebar-section-title">会话列表</div>
                <div id="sessionList" class="session-list">
                    <!-- 动态填充 -->
                </div>
            </div>


        </aside>

        <!-- 右侧主面板 -->
        <div class="main-panel">
            <!-- 顶部导航 -->
            <header class="header">
                <div class="header-brand">
                    <button id="sidebarOpenBtn" class="icon-btn sidebar-open-btn" title="展开侧栏" style="display:none;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <h1 class="header-title">MyAgent</h1>
                    <div class="header-conn-status" id="headerConnStatus">
                        <span class="header-conn-dot" id="headerConnDot"></span>
                        <span class="header-conn-text" id="headerConnText">未连接</span>
                    </div>
                    <span class="header-model-name" id="headerModelName"></span>
                </div>
                <div class="header-actions">
                    <button id="themeToggle" class="icon-btn" title="切换主题">
                        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5" />
                            <path
                                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                        </svg>
                        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        </svg>
                    </button>
                    <button id="clearBtn" class="icon-btn" title="清空对话">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                    </button>
                </div>
            </header>

            <!-- 对话区域 -->
            <main id="chatContainer" class="chat-container">
                <!-- 欢迎消息 -->
                <div class="welcome-message" id="welcomeMsg">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
                            <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.5" />
                            <circle cx="10" cy="11" r="2" fill="currentColor" />
                            <circle cx="18" cy="11" r="2" fill="currentColor" />
                            <path d="M9 18c1.5 2 7 2 9 0" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                    <h2>欢迎使用 MyAgent</h2>
                    <p>基于全自研 Python Agent 框架的智能助手</p>
                    <div class="quick-prompts">
                        <button class="quick-prompt" data-text="你好，请介绍一下你自己">👋 自我介绍</button>
                        <button class="quick-prompt" data-text="请执行 ls -la 命令查看当前目录">📁 查看目录</button>
                        <button class="quick-prompt" data-text="请读取 config.yaml 文件的内容">📄 读取文件</button>
                    </div>
                </div>

                <!-- 消息列表 -->
                <div id="messageList" class="message-list"></div>
            </main>

            <!-- 状态指示器：位于输入框上方居中 -->
            <div class="status-floating-container">
                <span id="statusIndicator" class="status-badge status-disconnected">未连接</span>
            </div>

            <!-- 底部渐变遮罩 + 输入区域 -->
            <div class="input-area-wrapper">
                <!-- 上下文使用量进度条 -->
                <div class="context-progress-container" id="contextProgressContainer">
                    <span class="context-progress-left" id="contextProgressLeft">0</span>
                    <div class="context-progress-bar">
                        <div class="context-progress-fill" id="contextProgressFill"></div>
                    </div>
                    <span class="context-progress-right" id="contextProgressRight">0</span>
                </div>
                <div class="input-fade-mask"></div>
                <footer class="input-area">
                    <div class="input-wrapper">
                        <textarea id="userInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="2"
                            autofocus></textarea>
                        <button id="sendBtn" class="send-btn" title="发送">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                        <button id="stopBtn" class="stop-btn" title="停止" style="display:none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="4" y="4" width="16" height="16" rx="2" />
                            </svg>
                        </button>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <!-- HITL 审批弹窗（全局备选） -->
    <div id="hitlModal" class="modal-overlay" style="display: none;">
        <div class="modal-card glass">
            <div class="modal-header">
                <span class="modal-icon">⚠️</span>
                <h3>需要人工审批</h3>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>工具</label>
                    <code id="hitlToolName"></code>
                </div>
                <div class="modal-field">
                    <label>原因</label>
                    <p id="hitlReason"></p>
                </div>
                <div class="modal-field">
                    <label>参数</label>
                    <pre id="hitlArgs"></pre>
                </div>
            </div>
            <div class="modal-footer">
                <button id="hitlReject" class="btn btn-danger">拒绝</button>
                <button id="hitlApprove" class="btn btn-success">批准</button>
            </div>
        </div>
    </div>

    <!-- marked.js — Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <!-- KaTeX — Math rendering -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
